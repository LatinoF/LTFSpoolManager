<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><ellipse cx='12' cy='5' rx='9' ry='3'></ellipse><path d='M3 5V19A9 3 0 0 0 21 19V5'></path><path d='M3 12A9 3 0 0 0 21 12'></path></svg>">
    <title>LTF Spool Manager</title>
    <script src="https://unpkg.com/lucide@latest"></script>
<style>
    :root {
        --bg: #0b0f1a; --card: #161b2b; --text: #ffffff;
        --accent: rgba(59,130,246,0.8); --success: #10b981; --danger: #ef4444; --border: #2d364d;
    }

    /* Global settings */
body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg); background-image: url('background2.png'); background-size: contain; background-position: center; background-repeat: no-repeat; background-attachment: fixed;  
    color: var(--text);
    margin: 0;
    user-select: none;
    touch-action: manipulation;
}

    /* NOISE OVERLAY */
    body::before {content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5;}
    
    /* GRID LINES BG */
    body::after {content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0;}

    
    header { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
    .app-title { margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; line-height: 1; display: flex; align-items: center; gap: 10px; }
    .app-title .logo-wrap {
        display: inline-flex; align-items: center; justify-content: center;
        width: 40px; height: 40px; border-radius: 12px;
        background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(59,130,246,0.05));
        border: 1px solid rgba(59,130,246,0.35);
        color: var(--accent);
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 1rem; padding-bottom: 120px; }
    .bkg-img{ position:fixed; height:auto; opacity: 1; pointer-events:none; z-index:-1; }
    /* DASHBOARD CARDS */
    #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .card { 
        background: linear-gradient(145deg, #1e253a, #161b2b);
        border-radius: 20px; padding: 1.5rem; border: 1px solid var(--border); 
        cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-title { font-size: 1.4rem; font-weight: 800; }
    .card-brand { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .color-indicator { width: 14px; height: 14px; border-radius: 50%; background: var(--glow-color); box-shadow: 0 0 10px var(--glow-color); border: 2px solid rgba(255,255,255,0.2); }
    .progress-bar { background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease-out; }
    .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
    .weight-text { font-size: 1.1rem; font-weight: 700; }

    /* FAB SYSTEM & TOOLTIPS */
    .fab-stack { position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; z-index: 1000; }
    .fab-stack button { position: relative; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    
    /* Tooltip Base */
    .fab-stack button::before {
        content: attr(data-label);
        position: absolute;
        right: 120%;
        background: #1e253a;
        color: #64748b;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 700;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transform: rotate(0deg) !important;
    }

    @media (hover: hover) { .fab-stack button:hover::before { opacity: 1; right: 110%; }}

    .fab-add { width: 64px; height: 64px; border-radius: 32px; background: var(--success); color: white; box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
    .settings-group { display: flex; flex-direction: column-reverse; align-items: center; gap: 10px; }
    .fab-settings { width: 48px; height: 48px; border-radius: 24px; background: var(--card); color: #64748b; border: 1px solid var(--border) !important; }
    .fab-settings.active { background: var(--accent); color: white; }
    
    .fab-settings { transition: background 0.2s ease-out, color 0.2s ease-out; }
    .fab-settings svg, .fab-settings i { transition: transform 0.2s ease-out !important; }
    .fab-settings.active svg, .fab-settings.active i { transform: rotate(90deg); }
    .fab-stack button::before { transform: none !important; transition: opacity 0.2s, right 0.2s !important; }
        
    .settings-subs { display: none; flex-direction: column-reverse; gap: 10px; }
    .settings-subs.show { display: flex; animation: slideUp 0.2s ease-out; }
    .fab-mini { width: 40px; height: 40px; border-radius: 20px; background: #1e253a; color: white; border: 1px solid var(--border) !important; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }


/* MODALS */
.modal { 
    display: none; 
    position: fixed; 
    inset: 0; 
    background: rgba(0,0,0,0); 
    align-items: center; 
    justify-content: center; 
    z-index: 2000; 
    padding: 10px; 
    transition: background 0.2s ease;
}

.modal.show { 
    display: flex; 
    background: rgba(0,0,0,0.85); 
}

.modal-content { 
    background: var(--card); 
    padding: 1.5rem; 
    border-radius: 24px; 
    width: 100%; 
    max-width: 480px; /* Allargato per il prezzo */
    position: relative;
    border: 1px solid var(--border); 
    display: flex;
    flex-direction: column;
    gap: 12px;
    
    /* ANIMAZIONE */
    opacity: 0;
    transform: scale(0.95) translateY(10px);
    transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal.show .modal-content {
    opacity: 1;
    transform: scale(1) translateY(0);
}

.close-modal { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    cursor: pointer; 
    color: #64748b; 
    line-height: 1;
    z-index: 100;
}
    
    .section-label { font-size: 0.7rem; font-weight: 800; color: #4b5563; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }
    input, select { background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.7rem; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; font-size: 0.9rem; }
    input:focus { border-color: var(--accent); }

    .row { display: flex; gap: 10px; align-items: center; }
    .row > * { flex: 1; }

    /* PICKER & CHIPS */
    .weight-row { display: flex; gap: 6px; align-items: stretch; }
    .chip { background: var(--bg); border: 1px solid var(--border); padding: 10px 5px; border-radius: 10px; text-align: center; font-size: 0.75rem; cursor: pointer; transition: 0.2s; flex: 1; display: flex; align-items: center; justify-content: center; }
    .chip.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
    .input-custom-weight { flex: 1.5; font-size: 0.8rem !important; padding: 8px !important; }

    .picker-area { background: rgba(0,0,0,0.25); border-radius: 14px; padding: 12px; border: 1px solid var(--border); }
    .sv-map { width: 100%; height: 180px; border-radius: 4px; position: relative; background: linear-gradient(to bottom, transparent, #000), linear-gradient(to right, #fff, transparent); background-color: red; touch-action: none; margin-bottom: 12px; }
    .sv-cursor { position: absolute; width: 12px; height: 12px; border: 1px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    .hue-container { position: relative; width: 100%; height: 24px; touch-action: none; margin-bottom: 12px; }
    .hue-strip { width: 100%; height: 100%; border-radius: 4px; background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); }
    .hue-cursor { position: absolute; top: -2px; width: 6px; height: 26px; background: white; border-radius: 4px; border: 1px solid #000; transform: translateX(-50%); pointer-events: none; }
    .preview-box { height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 1px solid var(--border); font-size: 0.7rem; }

    .color-presets { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
    .preset-dot { width: 28px; height: 28px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.15); cursor: pointer; transition: 0.2s; }
    .preset-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 12px rgba(255,255,255,0.2); }

    .btn { border: none; padding: 0.9rem; border-radius: 12px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
    .btn-success { background: var(--success); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); width: auto; }

    .close-modal { transition: color 0.2s ease, transform 0.2s ease; }
    .close-modal:hover { color: var(--danger) !important; transform: scale(1.1) rotate(90deg); }
    .close-modal svg { display: block; }
    
    /* DETAILS & HISTORY */
    .compact-info-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; }
    .compact-info-row h1 { margin: 0; font-size: 1.8rem; }
    
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-info { flex: 1; }
    .history-info span { font-size: 0.9rem; font-weight: 600; display: block; }
    .history-info small { opacity: 0.3; font-size: 0.75rem; }
    .history-actions { display: flex; align-items: center; gap: 12px; }
    .history-weight { color: var(--danger); font-weight: 800; font-size: 0.9rem; margin-right: 5px; }
    .history-price { color: var(--success); font-size: 0.75rem; font-weight: 700; background: rgba(16, 185, 129, 0.1); padding: 2px 6px; border-radius: 6px; margin-right: 5px;}
    
    .btn-hist-action { color: #4b5563; cursor: pointer; padding: 5px; transition: 0.2s; display: flex; align-items: center; }
    .btn-hist-action:hover.edit { color: var(--accent); }
    .btn-hist-action:hover.del { color: var(--danger); }

    #detail-view { display: none; }

    /* TRANSITION DASHBOARD */
    #main-view, #detail-view {transition: opacity 0.15s ease; opacity: 1;}
    .fade-out {opacity: 0 !important;}

</style>
</head>
<body>

    <header>
        <h1 class="app-title"><span class="logo-wrap"><i data-lucide="database" style="width:20px;height:20px"></i></span>LTF Spool Manager</h1>
       <!-- <h1 style="margin:0;font-size:1.8rem;letter-spacing:-1px;line-height:1;"> <i data-lucide="database" style=" display:inline-block; vertical-align:-0.12em; font-size:1em; width:1em; height:1em;"></i> LTF Spool Manager </h1> -->
    </header>

    <img src="A1.png" class="bkg-img" alt="Background A1" style="bottom:1rem; left:1rem; width:20vw;">
    <img src="Spool.png" class="bkg-img" alt="Background Spool" style="top:1rem; right:1rem; width:10vw;">

    <div class="container">
        <div id="main-view">
            <h3 style="margin-bottom: 1.5rem; opacity: 0.7;">Spool Inventory</h3>
            <div id="dashboard"></div>
        </div>

        <div id="detail-view">
            <button class="btn btn-outline" style="margin-bottom:20px" onclick="showDashboard()">
                <i data-lucide="arrow-big-left" style="width:18px"></i> Dashboard
            </button>
            <div id="detail-info"></div>
            <div class="section-label" style="margin-bottom:8px; font-size:1rem; line-height:1;"> <i data-lucide="history" style="display:inline-block; vertical-align:-0.12em; font-size:1em; width:1em; height:1em;"></i> Print History </div>
            <div id="history-container" style="background:var(--card); border-radius:16px; padding:5px; border:1px solid var(--border)"></div>
        </div>
    </div>

    <div class="fab-stack">
    <button class="fab-add" data-label="Add Spool" onclick="handleMasterAction()">
        <i data-lucide="plus"></i>
    </button>
    
    <div class="settings-group">
        <button class="fab-settings" id="settings-btn" data-label="Settings" onclick="toggleSettings()">
            <i data-lucide="settings"></i>
        </button>
        <div class="settings-subs" id="settings-subs">
            </div>
    </div>
</div>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">

    <div id="modal-bobina" class="modal">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal('modal-bobina')"><i data-lucide="x"></i></div>
            <h4 id="modal-bobina-title" style="margin:0">New Spool</h4>
            <div class="section-label">Material, Brand & Price</div>
            <div class="row">
                <select id="bobina-mat"><option>PLA</option><option>PLA+</option><option>PLA Rapid</option><option>PETG</option><option>PETG HF</option><option>TPU</option><option>ABS</option></select>
                <input type="text" id="bobina-marca" placeholder="Brand">
                <input type="number" id="bobina-prezzo" placeholder="Spool Price (€$)" step="0.01">
            </div>
            <div class="section-label">Weight</div>
            <div class="weight-row">
                <div class="chip" onclick="setWeight(250, this)">250g</div>
                <div class="chip" onclick="setWeight(500, this)">500g</div>
                <div class="chip active" onclick="setWeight(1000, this)">1kg</div> <input type="number" id="bobina-peso-custom" class="input-custom-weight" placeholder="Custom (g)" oninput="clearChips()">
            </div>
            <div class="section-label">Color</div>
            <div class="picker-area">
                <div class="color-presets">
                    <div class="preset-dot active" style="background:#000000" onclick="setPreset('#000000', this)"></div>
                    <div class="preset-dot" style="background:#545454" onclick="setPreset('#545454', this)"></div>
                    <div class="preset-dot" style="background:#ffffff" onclick="setPreset('#ffffff', this)"></div>
                    <div class="preset-dot" style="background:#0055b8" onclick="setPreset('#0055b8', this)"></div>
                    <div class="preset-dot" style="background:#00b946" onclick="setPreset('#00b946', this)"></div>
                    <div class="preset-dot" style="background:#ed6c21" onclick="setPreset('#ed6c21', this)"></div>
                    <div class="preset-dot" style="background:#c12e1f" onclick="setPreset('#c12e1f', this)"></div>
                </div>
                <div class="hue-container" onmousedown="startDragH(event)" ontouchstart="startDragH(event)"><div class="hue-strip"></div><div id="hue-cursor" class="hue-cursor"></div></div>
                <div class="sv-map" id="sv-map" onmousedown="startDragSV(event)" ontouchstart="startDragSV(event)"><div id="sv-cursor" class="sv-cursor"></div></div>
                <input type="text" id="final-preview" class="preview-box" 
                    style="text-align: center; border: none; width: 100%; cursor: text;" 
                    onchange="handleHexInput(this.value)">
            </div>
            <button class="btn btn-success" onclick="saveBobina()"><i data-lucide="save"></i> Save</button>
        </div>
    </div>

    <div id="modal-stampa" class="modal"><div class="modal-content"><div class="close-modal" onclick="closeModal('modal-stampa')"><i data-lucide="x"></i></div><h4 style="margin:0">Add Print Job</h4><div class="section-label">Details</div><input type="number" id="print-peso" placeholder="Print Wheight"><input type="text" id="print-desc" placeholder="Description" style="text-transform: uppercase;"><button class="btn btn-success" onclick="addPrint()"><i data-lucide="diamond-plus"></i> Add</button></div></div>
    <div id="modal-edit-print" class="modal"><div class="modal-content"><div class="close-modal" onclick="closeModal('modal-edit-print')"><i data-lucide="x"></i></div><h4 style="margin:0">Edit Print Job</h4><div class="section-label">Print Job Data</div><input type="number" id="edit-print-peso" placeholder="Grammi"><input type="text" id="edit-print-desc" placeholder="PROGETTO" style="text-transform: uppercase;"><button class="btn btn-success" onclick="confirmEditPrint()"><i data-lucide="save"></i> Update</button></div></div>

    <div id="modal-confirm" class="modal">
    <div class="modal-content" style="text-align: center; gap: 20px;">
        <div id="confirm-icon" style="margin-bottom: 10px;">
            <i data-lucide="alert-triangle" style="width: 48px; height: 48px; color: var(--danger);"></i>
        </div>
        <h4 id="confirm-title" style="margin:0; font-size: 1.2rem;">Confirm</h4>
        <p id="confirm-msg" style="margin:0; opacity: 0.7; font-size: 0.9rem;">This action cannot be undone</p>
        <div class="row" style="margin-top: 10px;">
            <button class="btn btn-outline" onclick="closeModal('modal-confirm')">Cancel</button>
            <button id="confirm-btn-exec" class="btn" style="background: var(--danger); color: white;">Confirm</button>
        </div>
    </div>
    </div>  

    <script>
let bobine = JSON.parse(localStorage.getItem('LTF_Spool_Manager_DB')) || [];
let activeIndex = null, editingPrintIdx = null, isDetailMode = false, isEditMode = false;
let selectedWeight = 1000; // Impostato a 1000 di default
let state = { h: 0, s: 0, v: 0, color: '#000000' };

lucide.createIcons();

// --- GESTIONE INPUT TASTIERA E CLICK ESTERNO ---
window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const activeModal = document.querySelector('.modal[style*="display: flex"]');
        if (activeModal) {
            const confirmBtn = activeModal.querySelector('.btn-success, #confirm-btn-exec');
            if (confirmBtn) confirmBtn.click();
        }
    }
    if (e.key === 'Escape') {
        const activeModal = document.querySelector('.modal[style*="display: flex"]');
        if (activeModal) closeModal(activeModal.id);
    }
});

window.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('modal')) {
        closeModal(e.target.id);
    }
    
    // Chiude il FAB se clicchi fuori dal gruppo impostazioni
    if (!e.target.closest('.settings-group')) {
        closeSettingsMenu();
    }
});

// --- NAVIGAZIONE E CRONOLOGIA (MOUSE BACK BUTTON) ---
window.addEventListener('popstate', (e) => {
    if (e.state && e.state.view === 'detail') {
        renderDetail(e.state.index);
    } else {
        execShowDashboard(true);
    }
});

function showDetail(i) {
    const newState = { view: 'detail', index: i };
    if (window.history.state && window.history.state.view === 'detail') {
        history.replaceState(newState, "");
    } else {
        history.pushState(newState, "");
    }
    renderDetail(i);
}

function renderDetail(i) {
    // 1. Chiude il menu delle impostazioni se è rimasto aperto
    closeSettingsMenu();

    const mainView = document.getElementById('main-view');
    const detailView = document.getElementById('detail-view');
    
    // Animazione di uscita della dashboard
    mainView.classList.add('fade-out');

    setTimeout(() => {
        mainView.style.display = 'none';
        detailView.style.display = 'block';
        detailView.classList.add('fade-out');
        
        activeIndex = i; 
        isDetailMode = true; 
        const b = bobine[i];
        
        // Calcolo della percentuale per la barra (minimo 0 per non rompere il layout)
        const perc = Math.max(0, (b.pesoAttuale / b.pesoIniziale) * 100);
        
        // Logica colore rosso se il peso è negativo
        const weightColorStyle = b.pesoAttuale < 0 ? 'color: var(--danger);' : '';

        document.getElementById('detail-info').innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
                <div style="width:20px; height:20px; border-radius:50%; background:${b.colore}; border:2px solid white"></div>
                <h2 style="margin:0">${b.materiale}</h2>
            </div>
            
            <div class="compact-info-row" style="flex-direction: column; align-items: stretch; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <small style="opacity:0.5; font-size:0.6rem; font-weight:800">Brand & Price</small>
                        <div style="font-weight:700">${b.marca} (${b.prezzo || 0}€$)</div>
                    </div>
                    <div style="text-align:right">
                        <small style="opacity:0.5; font-size:0.6rem; font-weight:800">Remaining</small>
                        <h1 style="margin:0; ${weightColorStyle}">
                            ${b.pesoAttuale}<small style="font-size:1rem;">g</small>
                            <span style="opacity:0.6; color: var(--text)"> / ${b.pesoIniziale}</span>
                            <small style="font-size:1rem; opacity:0.6; color: var(--text)">g</small>
                        </h1>
                    </div>
                </div>

                <div style="width: 100%;">
                    <div class="progress-bar" style="height: 12px; background: rgba(0,0,0,0.4);">
                        <div class="progress-fill" style="width: ${perc}%; background: ${b.colore}; box-shadow: 0 0 10px ${b.colore}44;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.7rem; font-weight: 700; opacity: 0.6;">
                        <span>0g</span>
                        <span>${Math.round(perc)}% available</span>
                        <span>${b.pesoIniziale}g</span>
                    </div>
                </div>
            </div>`;
        
        // Aggiorna l'etichetta del tasto FAB
        document.querySelector('.fab-add').setAttribute('data-label', 'Add Print Job');
        
        // Carica la cronologia delle stampe
        renderHistory(b);

        // Animazione di entrata del dettaglio
        setTimeout(() => {
            detailView.classList.remove('fade-out');
            mainView.classList.remove('fade-out');
        }, 50);
    }, 200);
}

function renderHistory(b) {
    const container = document.getElementById('history-container');
    container.innerHTML = '';

    if(!b.stampe || b.stampe.length === 0) {
        container.innerHTML = '<div style="padding:20px; opacity:0.3; text-align:center">No prints recorded</div>';
        return;
    }

    const costoAlGrammo = b.prezzo ? (b.prezzo / b.pesoIniziale) : 0;

    // --- NUOVA LOGICA DI CALCOLO PROGRESSIVO ---
    // Partiamo dal peso iniziale e sottraiamo le stampe in ordine CRONOLOGICO (non invertito)
    // per determinare quali grammi erano "pagati" e quali "gratis".
    let pesoResiduoProgressivo = b.pesoIniziale;

    // Creiamo una mappa dei costi calcolati correttamente
    const costiCalcolati = b.stampe.map(s => {
        let grammiPagati = 0;
        
        if (pesoResiduoProgressivo > 0) {
            // Se c'è ancora peso disponibile, calcoliamo quanto di questa stampa è pagato
            grammiPagati = Math.min(s.peso, pesoResiduoProgressivo);
        } else {
            // Se il peso residuo era già <= 0, tutta la stampa è gratis
            grammiPagati = 0;
        }

        pesoResiduoProgressivo -= s.peso;
        return (grammiPagati * costoAlGrammo).toFixed(2);
    });

    // Ora renderizziamo la lista (invertita per mostrare le ultime stampe in alto)
    b.stampe.slice().reverse().forEach((s, idx) => {
        const originalIdx = b.stampe.length - 1 - idx;
        const costoStampa = costiCalcolati[originalIdx]; // Prendiamo il costo pre-calcolato
        
        const negativeStyle = b.pesoAttuale < 0 ? 'color: var(--danger); font-weight: 800;' : '';

        container.innerHTML += `
            <div class="history-item">
                <div class="history-info">
                    <span style="text-transform: uppercase;">${s.desc}</span>
                    <small>${s.date}</small>
                </div>
                <div class="history-actions">
                    <span class="history-price">${costoStampa}€$</span>
                    <span class="history-weight" style="${negativeStyle}">-${s.peso}g</span>
                    <div class="btn-hist-action edit" onclick="openEditPrint(${originalIdx})">
                        <i data-lucide="pencil" style="width:16px"></i>
                    </div>
                    <div class="btn-hist-action del" onclick="deletePrint(${originalIdx})">
                        <i data-lucide="trash-2" style="width:16px"></i>
                    </div>
                </div>
            </div>`;
    });

    lucide.createIcons({root: container});
}

function showDashboard() {
    if (window.history.state && window.history.state.view === 'detail') {
        history.back();
    } else {
        execShowDashboard();
    }
}

function execShowDashboard(fromPopState = false) {
    closeSettingsMenu(); 
    const mainView = document.getElementById('main-view');
    const detailView = document.getElementById('detail-view');
    isDetailMode = false;
    detailView.classList.add('fade-out');
    setTimeout(() => {
        detailView.style.display = 'none';
        mainView.style.display = 'block';
        mainView.classList.add('fade-out');
        document.querySelector('.fab-add').setAttribute('data-label', 'Add Spool');
        renderDashboard();
        setTimeout(() => {
            mainView.classList.remove('fade-out');
            detailView.classList.remove('fade-out');
        }, 50);
    }, 200);
}

function closeSettingsMenu() {
    const btn = document.getElementById('settings-btn');
    const subs = document.getElementById('settings-subs');
    if (btn && subs) {
        btn.classList.remove('active');
        subs.classList.remove('show');

}

// --- CORE FUNCTIONS ---
function handleMasterAction() { if(isDetailMode) openModal('modal-stampa'); else { isEditMode = false; openModal('modal-bobina'); resetBobinaForm(); } }

function toggleSettings() { 
    const btn = document.getElementById('settings-btn');
    const subs = document.getElementById('settings-subs');
    btn.classList.toggle('active'); 
    const isOpen = btn.classList.contains('active');
    subs.classList.toggle('show', isOpen);
    if(isOpen) {
        if(isDetailMode) {
            subs.innerHTML = `<button class="fab-mini" data-label="Delete Spool" style="color:var(--danger)" onclick="deleteActiveBobina()"><i data-lucide="trash-2"></i></button><button class="fab-mini" data-label="Edit Spool" onclick="openEditBobina()"><i data-lucide="square-pen"></i></button>`;
        } else {
            subs.innerHTML = `<button class="fab-mini" data-label="Reset DB" style="color:var(--danger)" onclick="resetMemory()"><i data-lucide="trash-2"></i></button><button class="fab-mini" data-label="Import DB" onclick="document.getElementById('importFile').click()"><i data-lucide="upload"></i></button><button class="fab-mini" data-label="Export DB" onclick="exportData()"><i data-lucide="download"></i></button>`;
        }
        lucide.createIcons({ root: subs });
    }
    btn.setAttribute('data-label', isOpen ? 'Close settings' : 'Settings');
}

// --- COLOR PICKER ---
let draggingH = false, draggingSV = false;
function startDragH(e) { draggingH = true; handleH(e); }
function startDragSV(e) { draggingSV = true; handleSV(e); }
function handleH(e) {
    const container = document.querySelector('.hue-container'); const rect = container.getBoundingClientRect();
    const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    let x = Math.max(0, Math.min(clientX - rect.left, rect.width));
    state.h = Math.round((x / rect.width) * 360);
    document.getElementById('hue-cursor').style.left = x + 'px';
    document.getElementById('sv-map').style.backgroundColor = `hsl(${state.h}, 100%, 50%)`;
    calculateFinal();
}
function handleSV(e) {
    const container = document.getElementById('sv-map'); const rect = container.getBoundingClientRect();
    const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    let x = Math.max(0, Math.min(clientX - rect.left, rect.width));
    let y = Math.max(0, Math.min(clientY - rect.top, rect.height));
    state.s = Math.round((x / rect.width) * 100);
    state.v = Math.round(100 - (y / rect.height) * 100);
    document.getElementById('sv-cursor').style.left = x + 'px'; document.getElementById('sv-cursor').style.top = y + 'px';
    calculateFinal();
}
function calculateFinal() {
    const l = (state.v / 100) * (1 - (state.s / 100) / 2);
    const sHSL = (l === 0 || l === 1) ? 0 : ((state.v / 100) - l) / Math.min(l, 1 - l);
    state.color = `hsl(${state.h}, ${Math.round(sHSL * 100)}%, ${Math.round(l * 100)}%)`;
    updatePreview();
}
function updatePreview() { 
    const p = document.getElementById('final-preview'); 
    const hexColor = hslToHex(state.color);
    p.value = hexColor.toUpperCase(); 
    p.style.backgroundColor = state.color; 
    p.style.color = (state.v > 60 && state.s < 40) ? '#000' : '#fff'; 
}

// Gestisce l'inserimento manuale dell'HEX
function handleHexInput(hex) {
    // Verifica se l'HEX è valido (formato #RRGGBB)
    if (/^#[0-9A-F]{6}$/i.test(hex)) {
        state.color = hex;
        
        // 1. Convertiamo l'HEX in valori RGB
        let r = parseInt(hex.slice(1, 3), 16);
        let g = parseInt(hex.slice(3, 5), 16);
        let b = parseInt(hex.slice(5, 7), 16);

        // 2. Convertiamo RGB in HSV per i cursori
        let r_n = r / 255, g_n = g / 255, b_n = b / 255;
        let max = Math.max(r_n, g_n, b_n), min = Math.min(r_n, g_n, b_n);
        let h, s, v = max;
        let d = max - min;
        s = max === 0 ? 0 : d / max;

        if (max === min) {
            h = 0; // achromatic
        } else {
            switch (max) {
                case r_n: h = (g_n - b_n) / d + (g_n < b_n ? 6 : 0); break;
                case g_n: h = (b_n - r_n) / d + 2; break;
                case b_n: h = (r_n - g_n) / d + 4; break;
            }
            h /= 6;
        }

        // 3. Aggiorniamo lo stato globale (convertendo in gradi e percentuali)
        state.h = Math.round(h * 360);
        state.s = Math.round(s * 100);
        state.v = Math.round(v * 100);

        // 4. Riposizioniamo i cursori fisicamente
        updateCursorPositions();
        
        // 5. Aggiorniamo l'anteprima (colore e contrasto testo)
        updatePreview();
    }
}
function updateCursorPositions() {
    // Riposiziona cursore HUE
    const hueContainer = document.querySelector('.hue-container');
    const hueRect = hueContainer.getBoundingClientRect();
    const hueX = (state.h / 360) * hueRect.width;
    document.getElementById('hue-cursor').style.left = hueX + 'px';
    
    // Aggiorna il colore di sfondo della mappa SV
    document.getElementById('sv-map').style.backgroundColor = `hsl(${state.h}, 100%, 50%)`;

    // Riposiziona cursore SV
    const svMap = document.getElementById('sv-map');
    const svRect = svMap.getBoundingClientRect();
    const svX = (state.s / 100) * svRect.width;
    const svY = (1 - (state.v / 100)) * svRect.height;
    
    document.getElementById('sv-cursor').style.left = svX + 'px';
    document.getElementById('sv-cursor').style.top = svY + 'px';
}

// Utility per convertire HSL (stringa) in HEX
function hslToHex(hslStr) {
    if (hslStr.startsWith('#')) return hslStr;
    
    let sep = hslStr.indexOf(",") > -1 ? "," : " ";
    let hsl = hslStr.substr(4).split(")")[0].split(sep);
    let h = hsl[0], s = hsl[1].substr(0,hsl[1].length - 1) / 100, l = hsl[2].substr(0,hsl[2].length - 1) / 100;

    let a = s * Math.min(l, 1 - l);
    let f = (n, k = (n + h / 30) % 12) => l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return `#${Math.round(255 * f(0)).toString(16).padStart(2, '0')}${Math.round(255 * f(8)).toString(16).padStart(2, '0')}${Math.round(255 * f(4)).toString(16).padStart(2, '0')}`;
}

window.addEventListener('mousemove', (e) => { if(draggingH) handleH(e); if(draggingSV) handleSV(e); });
window.addEventListener('touchmove', (e) => { if(draggingH) handleH(e); if(draggingSV) handleSV(e); }, {passive:false});
window.addEventListener('mouseup', () => { draggingH = false; draggingSV = false; });
window.addEventListener('touchend', () => { draggingH = false; draggingSV = false; });

// --- CRUD & LOGIC ---
function setWeight(val, el) { selectedWeight = val; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); if(el) el.classList.add('active'); document.getElementById('bobina-peso-custom').value = ''; }
function clearChips() { selectedWeight = null; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); }
function setPreset(hex, el) { 
    document.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active')); 
    if(el) el.classList.add('active'); 
    
    // Usiamo la nuova logica per sincronizzare tutto partendo dall'HEX del preset
    handleHexInput(hex); 
}
function resetBobinaForm() {
    document.getElementById('modal-bobina-title').innerText = "New Spool";
    document.getElementById('bobina-mat').value = 'PLA';
    document.getElementById('bobina-marca').value = '';
    document.getElementById('bobina-prezzo').value = '';
    document.getElementById('bobina-peso-custom').value = '';
    
    // Reset Peso (1kg default come richiesto prima)
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    selectedWeight = 1000;
    const chips = document.querySelectorAll('.chip');
    chips.forEach(chip => { if(chip.innerText === '1kg') chip.classList.add('active'); });

    // --- RESET COLORE NERO ---
    state = { h: 0, s: 0, v: 0, color: '#000000' };
    
    // Posiziona i cursori graficamente
    document.getElementById('hue-cursor').style.left = '0px';
    document.getElementById('sv-cursor').style.left = '0px';
    document.getElementById('sv-cursor').style.top = '100%'; // In basso = Nero
    document.getElementById('sv-map').style.backgroundColor = `hsl(0, 100%, 50%)`;
    
    // Evidenzia il preset nero se presente
    document.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
    const blackPreset = document.querySelector('.preset-dot[style*="#000000"]');
    if(blackPreset) blackPreset.classList.add('active');
    
    updatePreview();
}

function openEditBobina() {
    isEditMode = true; const b = bobine[activeIndex]; toggleSettings();
    document.getElementById('modal-bobina-title').innerText = "Edit Spool";
    document.getElementById('bobina-mat').value = b.materiale; document.getElementById('bobina-marca').value = b.marca;
    document.getElementById('bobina-prezzo').value = b.prezzo || '';
    document.getElementById('bobina-peso-custom').value = b.pesoIniziale;
    state.color = b.colore; clearChips(); openModal('modal-bobina'); updatePreview();
}

function saveBobina() {
    const p = selectedWeight || Number(document.getElementById('bobina-peso-custom').value);
    const prezzo = parseFloat(document.getElementById('bobina-prezzo').value) || 0;
    if(!p) return;
    const mat = document.getElementById('bobina-mat').value;
    const marca = document.getElementById('bobina-marca').value.toUpperCase() || 'GENERIC';
    if(isEditMode) {
        const b = bobine[activeIndex]; const cons = b.pesoIniziale - b.pesoAttuale;
        b.materiale = mat; b.marca = marca; b.pesoIniziale = p; b.pesoAttuale = p - cons; b.colore = state.color; b.prezzo = prezzo;
    } else {
        bobine.push({ materiale: mat, marca: marca, pesoIniziale: p, pesoAttuale: p, colore: state.color, prezzo: prezzo, stampe: [], lastUsed: Date.now() });
    }
    save(); closeModal('modal-bobina'); isEditMode ? renderDetail(activeIndex) : renderDashboard();
}

function addPrint() {
    const p = Number(document.getElementById('print-peso').value); 
    const d = document.getElementById('print-desc').value.toUpperCase() || 'Generic Print Job';
    if(p > 0) { 
        bobine[activeIndex].pesoAttuale -= p; 
        bobine[activeIndex].lastUsed = Date.now(); 
        const formattedDate = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        bobine[activeIndex].stampe.push({ peso: p, desc: d, date: formattedDate }); 
        save(); closeModal('modal-stampa'); renderDetail(activeIndex); 
        document.getElementById('print-peso').value = ''; document.getElementById('print-desc').value = '';
    }
}

function openEditPrint(idx) { editingPrintIdx = idx; const s = bobine[activeIndex].stampe[idx]; document.getElementById('edit-print-peso').value = s.peso; document.getElementById('edit-print-desc').value = s.desc; openModal('modal-edit-print'); }
function confirmEditPrint() {
    const b = bobine[activeIndex]; const s = b.stampe[editingPrintIdx]; const newP = Number(document.getElementById('edit-print-peso').value);
    b.pesoAttuale = b.pesoAttuale + s.peso - newP; s.peso = newP; s.desc = document.getElementById('edit-print-desc').value.toUpperCase();
    save(); closeModal('modal-edit-print'); renderDetail(activeIndex);
}

// --- MODALS CONFERMA ---
function askConfirmation(title, msg, actionFn) {
    document.getElementById('confirm-title').innerText = title;
    document.getElementById('confirm-msg').innerText = msg;
    const btn = document.getElementById('confirm-btn-exec');
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.onclick = () => { actionFn(); closeModal('modal-confirm'); };
    openModal('modal-confirm');
}

function deletePrint(idx) { askConfirmation("Delete Print", "This action cannot be undone. Proceed?", () => { bobine[activeIndex].pesoAttuale += bobine[activeIndex].stampe[idx].peso; bobine[activeIndex].stampe.splice(idx, 1); save(); renderDetail(activeIndex); }); }
function deleteActiveBobina() { askConfirmation("Delete Spool", "This action cannot be undone. Proceed?", () => { bobine.splice(activeIndex, 1); save(); if(document.getElementById('settings-subs').classList.contains('show')) toggleSettings(); showDashboard(); }); }
function resetMemory() { askConfirmation("Reset Database", "This action cannot be undone. Proceed?", () => { bobine = []; save(); renderDashboard(); if(document.getElementById('settings-subs').classList.contains('show')) toggleSettings(); }); }

// --- UTILS ---
function save() { localStorage.setItem('LTF_Spool_Manager_DB', JSON.stringify(bobine)); }
function openModal(id) {
    const modal = document.getElementById(id);
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
    lucide.createIcons();
}
function closeModal(id) {
    const modal = document.getElementById(id);
    modal.classList.remove('show');
    setTimeout(() => { if(!modal.classList.contains('show')) modal.style.display = 'none'; }, 200);
}
function exportData() { const blob = new Blob([JSON.stringify(bobine)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "LTF_Spool_Manager_DB.json"; a.click(); toggleSettings(); }
function importData(e) { const r = new FileReader(); r.onload = (ev) => { try { bobine = JSON.parse(ev.target.result); save(); renderDashboard(); } catch(e){alert("Errore")} }; r.readAsText(e.target.files[0]); toggleSettings(); }

function renderDashboard() {
    const grid = document.getElementById('dashboard'); 
    grid.innerHTML = bobine.length ? '' : `<div style="grid-column: 1/-1; text-align:center; padding: 40px; opacity:0.3"><i data-lucide="package-search" style="width:48px; height:48px; margin-bottom:10px"></i><p>Nothing to see here yet.<br>Use the + button to add a new spool.</p></div>`;
    const sortedBobine = bobine.map((b, index) => ({ ...b, originalIndex: index })).sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
    
    sortedBobine.forEach((b) => {
        const perc = Math.max(0, (b.pesoAttuale / b.pesoIniziale) * 100);
        // Determina il colore del peso: rosso se negativo, altrimenti ereditato (bianco)
        const weightColor = b.pesoAttuale < 0 ? 'var(--danger)' : 'inherit';

        grid.innerHTML += `
            <div class="card" onclick="showDetail(${b.originalIndex})" style="--glow-color: ${b.colore}">
                <div class="card-header">
                    <div><div class="card-brand">${b.marca}</div><div class="card-title">${b.materiale}</div></div>
                    <div class="color-indicator"></div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${perc}%; background: ${b.colore}"></div></div>
                <div class="card-footer">
                    <div class="weight-text" style="color: ${weightColor}">${b.pesoAttuale}g <small style="opacity: 0.3; font-weight: 400; color: var(--text)">/ ${b.pesoIniziale}g</small></div>
                    <div style="font-size:0.8rem; font-weight: 800; opacity:0.6">${Math.round(perc)}%</div>
                </div>
            </div>`;
    });
    lucide.createIcons();
}
renderDashboard();

// Pulizia cronologia di navigazione
if (window.history.state && window.history.state.view === 'detail') {
    history.replaceState({ view: 'dashboard' }, "");
    execShowDashboard(); 
} else {
    renderDashboard();
}



    </script>
